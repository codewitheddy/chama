{% extends 'base.html' %}
{% block title %}Delete Rule{% endblock %}
{% block page_title %}Delete Penalty Rule{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
    <div class="card border-danger">
        <div class="card-header text-danger"><i class="bi bi-trash me-2"></i>Confirm Delete</div>
        <div class="card-body">
            <p>Delete rule <strong>{{ object.name }}</strong> (KES {{ object.default_amount }})?</p>
            <form method="post">{% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'meetings:rules' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
