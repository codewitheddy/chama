{# Usage: {% include 'includes/payment_type_badge.html' with obj=record %} #}
{% if obj.payment_type == 'mpesa' %}
    <span class="badge" style="background:#f0fdf4;color:#16a34a;">
        <i class="bi bi-phone me-1"></i>M-Pesa
    </span>
    {% if obj.mpesa_code %}
    <div class="text-muted" style="font-size:0.72rem;font-family:monospace;">{{ obj.mpesa_code }}</div>
    {% endif %}
{% else %}
    <span class="badge" style="background:#eff6ff;color:#2563eb;">
        <i class="bi bi-cash-coin me-1"></i>Cash
    </span>
{% endif %}
